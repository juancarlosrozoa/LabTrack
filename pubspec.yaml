name: labtrack
description: Mobile inventory management app for laboratory supplies.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.9.1

  # Local storage (offline-first)
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.27

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Barcode
  mobile_scanner: ^7.0.1
  barcode_widget: ^2.0.4

  # Push notifications
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Google Sheets sync
  googleapis: ^14.0.0
  google_sign_in: ^6.2.2
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # Connectivity / offline detection
  connectivity_plus: ^6.1.4

  # Sharing
  share_plus: ^10.1.4

  # Markdown rendering (in-app help)
  flutter_markdown_plus: ^1.0.7

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  drift_dev: ^2.23.1
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - docs/MANUAL_EN.md
    - docs/MANUAL_FR.md
    - docs/MANUAL_ES.md
    - docs/MANUAL_EN.pdf
    - docs/MANUAL_FR.pdf
    - docs/MANUAL_ES.pdf
